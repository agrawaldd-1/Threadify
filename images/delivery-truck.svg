<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff009d"></stop>
      <stop offset="45%" stop-color="#7b3ae3"></stop>
      <stop offset="90%" stop-color="#8f05df"></stop>
    </linearGradient>
  </defs>

  <!-- Truck Body -->
  <rect x="12" y="42" width="62" height="38" rx="6" fill="url(#truckGradient)"></rect>

  <!-- Cabin -->
  <path d="M74 50H94L108 62V80H74V50Z" fill="url(#truckGradient)"></path>

  <!-- Window -->
  <path d="M82 56H92L100 64V68H82V56Z" fill="white" fill-opacity="0.9"></path>

  <!-- Wheels -->
  <circle cx="34" cy="90" r="12" fill="#222"></circle>
  <circle cx="34" cy="90" r="6" fill="white"></circle>

  <circle cx="92" cy="90" r="12" fill="#222"></circle>
  <circle cx="92" cy="90" r="6" fill="white"></circle>

  <!-- Speed Lines -->
  <rect x="4" y="52" width="16" height="4" rx="2" fill="url(#truckGradient)"></rect>
  <rect x="0" y="62" width="20" height="4" rx="2" fill="url(#truckGradient)"></rect>
  <rect x="8" y="72" width="12" height="4" rx="2" fill="url(#truckGradient)"></rect>
</svg>